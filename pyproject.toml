[tool.black]
line-length = 99
target-version = ["py311"]

[tool.isort]
profile = "black"
skip = [".venv", "venv"]
line_length = 99

[tool.mypy]
exclude = '(^\.venv/|^venv/)'
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
disallow_untyped_defs = false
follow_imports = "skip"
follow_untyped_imports = false
