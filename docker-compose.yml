version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    image: ppe-detection-api:latest
    container_name: ppe-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
      - ./outputs:/app/outputs
      - ./best_model.pt:/app/best_model.pt:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
